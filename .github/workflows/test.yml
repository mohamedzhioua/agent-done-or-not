name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: behavior tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: bash tests/run.sh
