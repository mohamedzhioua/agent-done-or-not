name: Agent Done Or Not
description: Gate a GitHub Actions job on proof-of-done receipts.

inputs:
  mode:
    description: Action mode. Only "assert" is currently supported.
    required: false
    default: assert
  labels:
    description: Space-separated receipt labels to require.
    required: false
    default: ""
  ttl:
    description: Maximum receipt age in seconds. Empty uses done-gate.sh default behavior.
    required: false
    default: ""
  allow-command-regex:
    description: Regex that the recorded command must match.
    required: false
    default: ""
  json:
    description: Emit machine-readable JSON output when "true".
    required: false
    default: "false"
  working-directory:
    description: Directory to run the assertion from.
    required: false
    default: "."
  pr-comment:
    description: When "true" and the event is a pull_request, upsert a sticky PR comment with the proof summary.
    required: false
    default: "false"
  github-token:
    description: GitHub token used to post the PR comment.
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Assert proof-of-done receipts
      shell: bash
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_LABELS: ${{ inputs.labels }}
        INPUT_TTL: ${{ inputs.ttl }}
        INPUT_ALLOW_COMMAND_REGEX: ${{ inputs.allow-command-regex }}
        INPUT_JSON: ${{ inputs.json }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail

        cd "$INPUT_WORKING_DIRECTORY"

        if [ "$INPUT_MODE" != "assert" ]; then
          printf 'agent-done-or-not action: unsupported mode "%s"; only "assert" is supported.\n' "$INPUT_MODE" >&2
          exit 2
        fi

        args=(assert)

        if [ -n "$INPUT_LABELS" ]; then
          read -r -a labels <<< "$INPUT_LABELS"
          for label in "${labels[@]}"; do
            args+=(--label "$label")
          done
        fi

        if [ -n "$INPUT_TTL" ]; then
          args+=(--ttl "$INPUT_TTL")
        fi

        if [ -n "$INPUT_ALLOW_COMMAND_REGEX" ]; then
          args+=(--allow-command-regex "$INPUT_ALLOW_COMMAND_REGEX")
        fi

        if [ "$INPUT_JSON" = "true" ]; then
          args+=(--json)
        fi

        set +e
        output="$(bash "$GITHUB_ACTION_PATH/done-gate.sh" "${args[@]}" 2>&1)"
        status=$?
        set -e

        printf '%s\n' "$output"

        if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          {
            printf '## agent-done-or-not proof summary\n\n'
            printf -- '- mode: `%s`\n' "$INPUT_MODE"
            printf -- '- labels: `%s`\n' "${INPUT_LABELS:-latest}"
            printf -- '- status: `%s`\n\n' "$status"
            # HTML-escape gate output into a <pre> block: receipt/command text is
            # agent-controlled, so a raw ```fence``` could be broken out of and
            # inject markdown into the job summary.
            printf '<pre>\n'
            printf '%s\n' "$output" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'
            printf '</pre>\n'
          } >> "$GITHUB_STEP_SUMMARY"
        fi

        # Write assert output + status to temp files so the comment step can read them.
        if [ -n "${RUNNER_TEMP:-}" ]; then
          printf '%s' "$output" > "$RUNNER_TEMP/agent-done-assert-output.txt"
          printf '%s' "$status" > "$RUNNER_TEMP/agent-done-assert-status.txt"
        fi

        exit "$status"

    - name: Post proof summary as PR comment
      if: ${{ inputs.pr-comment == 'true' && github.event_name == 'pull_request' }}
      continue-on-error: true
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        set -uo pipefail

        if [ -z "${PR_NUMBER:-}" ]; then
          printf 'agent-done-or-not: PR number not available; skipping comment.\n' >&2
          exit 0
        fi

        # Read assert output and status captured by the assert step.
        assert_output=""
        assert_status="unknown"
        if [ -n "${RUNNER_TEMP:-}" ]; then
          if [ -f "$RUNNER_TEMP/agent-done-assert-output.txt" ]; then
            assert_output="$(cat "$RUNNER_TEMP/agent-done-assert-output.txt")"
          fi
          if [ -f "$RUNNER_TEMP/agent-done-assert-status.txt" ]; then
            assert_status="$(cat "$RUNNER_TEMP/agent-done-assert-status.txt")"
          fi
        fi

        if [ "$assert_status" = "0" ]; then
          status_icon="OK"
          status_word="PASS"
        else
          status_icon="FAIL"
          status_word="FAILED"
        fi

        # HTML-escape the assert output for use in a <pre> block (agent-controlled text).
        escaped_output="$(printf '%s\n' "$assert_output" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')"

        # Build the comment body with printf (no heredoc to avoid YAML parse issues).
        # Opening and closing markers let the action find and update the comment in place.
        marker="<!-- agent-done-or-not:proof -->"
        status_line="${status_icon} Proof of Done - ${status_word} (exit ${assert_status})"
        comment_body="$(printf '%s\n%s\n\n<pre>\n%s\n</pre>\n%s' \
          "$marker" \
          "$status_line" \
          "$escaped_output" \
          "$marker")"

        # Upsert: find an existing comment containing the marker, PATCH it; else POST new.
        existing_comment_id="$(gh api \
          "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
          --paginate \
          --jq '.[] | select(.body | contains("<!-- agent-done-or-not:proof -->")) | .id' \
          2>/dev/null | head -n1 || true)"

        if [ -n "$existing_comment_id" ]; then
          gh api \
            --method PATCH \
            "repos/${GITHUB_REPOSITORY}/issues/comments/${existing_comment_id}" \
            --field body="$comment_body" \
            >/dev/null
        else
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --field body="$comment_body" \
            >/dev/null
        fi
