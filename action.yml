name: Agent Done Or Not
description: Gate a GitHub Actions job on proof-of-done receipts (assert committed receipts, or verify by re-running checks fresh).

inputs:
  mode:
    description: 'Action mode: "assert" trusts committed receipts; "verify" ignores them and re-runs the checks fresh from the pinned Action code.'
    required: false
    default: assert
  checks:
    description: |
      For mode: verify — the checks to re-run, one "label: command" per line, e.g.
        checks: |
          test: npm test
          build: npm run build
      Each command is run through `bash -c`. Ignored in mode: assert.
    required: false
    default: ""
  labels:
    description: Space-separated receipt labels to require.
    required: false
    default: ""
  ttl:
    description: Maximum receipt age in seconds. Empty uses done-gate.sh default behavior.
    required: false
    default: ""
  allow-command-regex:
    description: Regex that the recorded command must match.
    required: false
    default: ""
  json:
    description: Emit machine-readable JSON output when "true".
    required: false
    default: "false"
  working-directory:
    description: Directory to run the assertion from.
    required: false
    default: "."
  pr-comment:
    description: When "true" and the event is a pull_request, upsert a sticky PR comment with the proof summary.
    required: false
    default: "false"
  github-token:
    description: GitHub token used to post the PR comment.
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Reject unsupported mode
      if: ${{ inputs.mode != 'assert' && inputs.mode != 'verify' }}
      shell: bash
      env:
        INPUT_MODE: ${{ inputs.mode }}
      run: |
        printf 'agent-done-or-not action: unsupported mode "%s"; use "assert" or "verify".\n' "$INPUT_MODE" >&2
        exit 2

    - name: Assert proof-of-done receipts
      if: ${{ inputs.mode == 'assert' }}
      shell: bash
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_LABELS: ${{ inputs.labels }}
        INPUT_TTL: ${{ inputs.ttl }}
        INPUT_ALLOW_COMMAND_REGEX: ${{ inputs.allow-command-regex }}
        INPUT_JSON: ${{ inputs.json }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail

        cd "$INPUT_WORKING_DIRECTORY"

        if [ "$INPUT_MODE" != "assert" ]; then
          printf 'agent-done-or-not action: unsupported mode "%s"; only "assert" is supported.\n' "$INPUT_MODE" >&2
          exit 2
        fi

        args=(assert)

        if [ -n "$INPUT_LABELS" ]; then
          read -r -a labels <<< "$INPUT_LABELS"
          for label in "${labels[@]}"; do
            args+=(--label "$label")
          done
        fi

        if [ -n "$INPUT_TTL" ]; then
          args+=(--ttl "$INPUT_TTL")
        fi

        if [ -n "$INPUT_ALLOW_COMMAND_REGEX" ]; then
          args+=(--allow-command-regex "$INPUT_ALLOW_COMMAND_REGEX")
        fi

        if [ "$INPUT_JSON" = "true" ]; then
          args+=(--json)
        fi

        set +e
        output="$(bash "$GITHUB_ACTION_PATH/done-gate.sh" "${args[@]}" 2>&1)"
        status=$?
        set -e

        printf '%s\n' "$output"

        if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          {
            printf '## agent-done-or-not proof summary\n\n'
            printf -- '- mode: `%s`\n' "$INPUT_MODE"
            printf -- '- labels: `%s`\n' "${INPUT_LABELS:-latest}"
            printf -- '- status: `%s`\n\n' "$status"
            # HTML-escape gate output into a <pre> block: receipt/command text is
            # agent-controlled, so a raw ```fence``` could be broken out of and
            # inject markdown into the job summary.
            printf '<pre>\n'
            printf '%s\n' "$output" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'
            printf '</pre>\n'
          } >> "$GITHUB_STEP_SUMMARY"
        fi

        # Write assert output + status to temp files so the comment step can read them.
        if [ -n "${RUNNER_TEMP:-}" ]; then
          printf '%s' "$output" > "$RUNNER_TEMP/agent-done-assert-output.txt"
          printf '%s' "$status" > "$RUNNER_TEMP/agent-done-assert-status.txt"
        fi

        exit "$status"

    - name: Verify proof-of-done (re-run checks fresh, ignore committed receipts)
      id: verify
      if: ${{ inputs.mode == 'verify' }}
      shell: bash
      env:
        INPUT_CHECKS: ${{ inputs.checks }}
        INPUT_TTL: ${{ inputs.ttl }}
        INPUT_ALLOW_COMMAND_REGEX: ${{ inputs.allow-command-regex }}
        INPUT_JSON: ${{ inputs.json }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: |
        # NOTE: no `set -e` — we run every check, record each receipt, and decide
        # the job status at the end from the collected exit codes.
        set -uo pipefail

        cd "$INPUT_WORKING_DIRECTORY"

        if [ -z "$(printf '%s' "$INPUT_CHECKS" | tr -d '[:space:]')" ]; then
          printf 'agent-done-or-not: mode: verify requires a non-empty "checks" input (one "label: command" per line).\n' >&2
          exit 2
        fi

        trim() { local s="$1"; s="${s#"${s%%[![:space:]]*}"}"; s="${s%"${s##*[![:space:]]}"}"; printf '%s' "$s"; }

        gate="$GITHUB_ACTION_PATH/done-gate.sh"

        # A CI-run-scoped run id so EVERY fresh capture lands in ONE ledger that a
        # single `assert --label ...` can read. It also makes the proof dir easy to
        # find for the artifact + summary below.
        export AGENT_DONE_SESSION="ci-verify-${GITHUB_RUN_ID:-local}-${GITHUB_RUN_ATTEMPT:-1}"

        # Resolve the proof dir exactly as done-gate.sh does (respecting an override).
        root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
        proof_dir="${AGENT_DONE_DIR:-$root/.agent-proof}"
        ledger="$proof_dir/$AGENT_DONE_SESSION/ledger.jsonl"

        labels=()
        cap_status=0

        # Re-run every declared check FRESH from the pinned engine. We deliberately
        # ignore any committed .agent-proof/: `capture` appends a new receipt and
        # `assert` reads the newest line per label, so a hand-written green receipt
        # cannot survive a red re-run — CI overwrites it with what actually happened.
        while IFS= read -r rawline; do
          line="$(trim "${rawline%$'\r'}")"
          [ -z "$line" ] && continue
          case "$line" in
            \#*) continue ;;
            *:*) ;;
            *) printf 'agent-done-or-not: bad check line (expected "label: command"): %s\n' "$line" >&2; exit 2 ;;
          esac
          label="$(trim "${line%%:*}")"
          command="$(trim "${line#*:}")"
          if [ -z "$label" ] || [ -z "$command" ]; then
            printf 'agent-done-or-not: bad check line (expected "label: command"): %s\n' "$line" >&2
            exit 2
          fi
          printf '::group::verify %s\n' "$label"
          bash "$gate" capture --label "$label" -- bash -c "$command"
          rc=$?
          printf '::endgroup::\n'
          [ "$rc" -ne 0 ] && cap_status=1
          labels+=("$label")
        done <<< "$INPUT_CHECKS"

        if [ "${#labels[@]}" -eq 0 ]; then
          printf 'agent-done-or-not: no runnable checks parsed from "checks" input.\n' >&2
          exit 2
        fi

        # Now assert the FRESH receipts (exit 0 + fresh + optional command regex).
        # We assert by EXPLICIT --label against this run only — deliberately NOT
        # policy mode. Policy mode does a global newest-epoch search across all run
        # dirs, so a committed receipt with a forged huge "epoch" could outrank our
        # fresh capture and win. Explicit --label reads only this CI-scoped run's
        # ledger, so a committed forgery can never influence the verdict.
        args=(assert)
        for l in "${labels[@]}"; do args+=(--label "$l"); done
        [ -n "$INPUT_TTL" ] && args+=(--ttl "$INPUT_TTL")
        [ -n "$INPUT_ALLOW_COMMAND_REGEX" ] && args+=(--allow-command-regex "$INPUT_ALLOW_COMMAND_REGEX")
        [ "$INPUT_JSON" = "true" ] && args+=(--json)

        output="$(bash "$gate" "${args[@]}" 2>&1)"
        assert_status=$?
        printf '%s\n' "$output"

        status=0
        [ "$cap_status" -ne 0 ] && status=1
        [ "$assert_status" -ne 0 ] && status=1

        commit="$(git rev-parse HEAD 2>/dev/null || printf 'unknown')"

        # Publish each fresh receipt's SHA + the commit it was verified against.
        if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          {
            printf '## agent-done-or-not: CI-verified receipts\n\n'
            printf -- '- mode: `verify`\n'
            printf -- '- commit: `%s`\n' "$commit"
            printf -- '- ref: `%s`\n' "${GITHUB_REF:-unknown}"
            printf -- '- status: `%s`\n\n' "$status"
            printf '| label | exit | sha256 |\n|---|---|---|\n'
            for l in "${labels[@]}"; do
              rline="$(grep -F "\"label\":\"$l\"" "$ledger" 2>/dev/null | tail -n1 || true)"
              rexit="$(printf '%s' "$rline" | grep -oE '"exit_code":[0-9]+' | head -n1 | grep -oE '[0-9]+' || true)"
              rsha="$(printf '%s' "$rline" | grep -oE '"sha256":"[0-9a-f]+"' | head -n1 | sed -E 's/.*"([0-9a-f]+)".*/\1/' || true)"
              printf '| `%s` | `%s` | `%s` |\n' "$l" "${rexit:-?}" "${rsha:-missing}"
            done
            printf '\n<pre>\n'
            printf '%s\n' "$output" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'
            printf '</pre>\n'
          } >> "$GITHUB_STEP_SUMMARY"
        fi

        # Expose the proof dir for the artifact step, and mirror the assert
        # output/status into RUNNER_TEMP so the shared PR-comment step can post it.
        if [ -n "${GITHUB_OUTPUT:-}" ]; then
          printf 'proof-dir=%s\n' "$proof_dir" >> "$GITHUB_OUTPUT"
        fi
        if [ -n "${RUNNER_TEMP:-}" ]; then
          printf '%s' "$output" > "$RUNNER_TEMP/agent-done-assert-output.txt"
          printf '%s' "$status" > "$RUNNER_TEMP/agent-done-assert-status.txt"
        fi

        exit "$status"

    - name: Upload proof receipts artifact
      if: ${{ always() && inputs.mode == 'verify' }}
      uses: actions/upload-artifact@v4
      with:
        name: agent-done-proof
        path: ${{ steps.verify.outputs.proof-dir }}
        if-no-files-found: ignore

    - name: Post proof summary as PR comment
      if: ${{ inputs.pr-comment == 'true' && github.event_name == 'pull_request' }}
      continue-on-error: true
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        set -uo pipefail

        if [ -z "${PR_NUMBER:-}" ]; then
          printf 'agent-done-or-not: PR number not available; skipping comment.\n' >&2
          exit 0
        fi

        # Read assert output and status captured by the assert step.
        assert_output=""
        assert_status="unknown"
        if [ -n "${RUNNER_TEMP:-}" ]; then
          if [ -f "$RUNNER_TEMP/agent-done-assert-output.txt" ]; then
            assert_output="$(cat "$RUNNER_TEMP/agent-done-assert-output.txt")"
          fi
          if [ -f "$RUNNER_TEMP/agent-done-assert-status.txt" ]; then
            assert_status="$(cat "$RUNNER_TEMP/agent-done-assert-status.txt")"
          fi
        fi

        if [ "$assert_status" = "0" ]; then
          status_icon="OK"
          status_word="PASS"
        else
          status_icon="FAIL"
          status_word="FAILED"
        fi

        # HTML-escape the assert output for use in a <pre> block (agent-controlled text).
        escaped_output="$(printf '%s\n' "$assert_output" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')"

        # Build the comment body with printf (no heredoc to avoid YAML parse issues).
        # Opening and closing markers let the action find and update the comment in place.
        marker="<!-- agent-done-or-not:proof -->"
        status_line="${status_icon} Proof of Done - ${status_word} (exit ${assert_status})"
        comment_body="$(printf '%s\n%s\n\n<pre>\n%s\n</pre>\n%s' \
          "$marker" \
          "$status_line" \
          "$escaped_output" \
          "$marker")"

        # Upsert: find an existing comment containing the marker, PATCH it; else POST new.
        existing_comment_id="$(gh api \
          "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
          --paginate \
          --jq '.[] | select(.body | contains("<!-- agent-done-or-not:proof -->")) | .id' \
          2>/dev/null | head -n1 || true)"

        if [ -n "$existing_comment_id" ]; then
          gh api \
            --method PATCH \
            "repos/${GITHUB_REPOSITORY}/issues/comments/${existing_comment_id}" \
            --field body="$comment_body" \
            >/dev/null
        else
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --field body="$comment_body" \
            >/dev/null
        fi
